name: Packagist Update

on:
  push:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify-packagist:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Packagist update
        if: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            "https://packagist.org/api/update-package?username=nash81&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -d '{"repository":{"url":"https://github.com/nash81/bsicards-php-sdk"}}'
